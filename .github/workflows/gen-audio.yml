name: gen-audio

on:
  workflow_dispatch:
    inputs:
      slug:
        description: "granth slug, or 'all' (= हर verse-granth; prose छोड़कर)"
        required: true
        default: "ishtopadesha"
      range:
        description: "verse range, e.g. '1 51' (blank = all)"
        required: false
        default: ""
      engine:
        description: "TTS engine"
        type: choice
        options: [mms-hin, parler]
        default: mms-hin

permissions:
  contents: write

concurrency:
  group: gen-audio
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      slugs: ${{ steps.mk.outputs.slugs }}
    steps:
      - uses: actions/checkout@v4
      - id: mk
        run: |
          if [ "${{ github.event.inputs.slug }}" = "all" ]; then
            S=$(grep -L "format: prose" shastra/*.md | grep -v README | xargs -n1 basename | sed 's/\.md$//' | jq -R . | jq -sc .)
          else
            S='["${{ github.event.inputs.slug }}"]'
          fi
          echo "slugs=$S" >> "$GITHUB_OUTPUT"
  generate:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 340
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        slug: ${{ fromJSON(needs.prepare.outputs.slugs) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          sudo apt-get -y -qq install ffmpeg
          pip install -q torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -q soundfile "transformers<4.47" git+https://github.com/huggingface/parler-tts.git
      - name: Generate
        env:
          ENGINE: ${{ github.event.inputs.engine }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python3 build/gen-audio.py "${{ matrix.slug }}" ${{ github.event.inputs.range }}
      - name: Commit audio
        run: |
          git config user.name "shrutdhara-audio-bot"
          git config user.email "actions@github.com"
          git add audio/
          if git diff --cached --quiet; then
            echo "no new audio — nothing to commit"
            exit 0
          fi
          git commit -m "स्वर: ${{ matrix.slug }} पाठ-ध्वनि (${{ github.event.inputs.engine }})"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "push retry $i"; sleep 5
          done
          exit 1
